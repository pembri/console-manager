<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Manager - VIP Indexing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Header -->
    <header class="p-6 border-b border-slate-800 mb-8 bg-slate-900/50 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-bolt text-yellow-400"></i> Console Manager
            </h1>
            <div id="authStatus" class="text-xs text-slate-400 flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full"></span> Belum Terhubung
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 space-y-6">
        
        <!-- Section 1: JSON Key Authorization -->
        <section class="glass-card p-6 rounded-2xl">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fas fa-key text-blue-400"></i> Otorisasi Kunci JSON
            </h2>
            <div class="border-2 border-dashed border-slate-700 rounded-xl p-8 text-center" id="dropZone">
                <input type="file" id="jsonInput" class="hidden" accept=".json">
                <label for="jsonInput" class="cursor-pointer">
                    <i class="fas fa-cloud-upload-alt text-4xl text-slate-500 mb-3"></i>
                    <p class="text-sm text-slate-400">Klik atau geser file <code class="text-blue-400">.json</code> ke sini</p>
                </label>
                <div id="fileInfo" class="mt-4 hidden text-sm text-green-400 font-mono"></div>
            </div>
        </section>

        <!-- Section 2: Instant URL Indexing & Sitemap -->
        <div class="grid md:grid-cols-2 gap-6">
            <section class="glass-card p-6 rounded-2xl">
                <h2 class="text-lg font-semibold mb-4">Request Indexing</h2>
                <div class="space-y-4">
                    <input type="url" id="targetUrl" placeholder="https://web-lo.com/artikel-baru" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="btnIndex" class="w-full btn-primary py-2 rounded-lg font-semibold text-sm">
                        Kirim ke Google
                    </button>
                    <p class="text-[10px] text-slate-500 text-center italic">Kuota: 200 URL/Hari</p>
                </div>
            </section>

            <section class="glass-card p-6 rounded-2xl">
                <h2 class="text-lg font-semibold mb-4">Sitemap Submitter</h2>
                <div class="space-y-4">
                    <input type="url" id="sitemapUrl" placeholder="https://web-lo.com/sitemap.xml" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="btnSitemap" class="w-full bg-slate-700 hover:bg-slate-600 py-2 rounded-lg font-semibold text-sm transition-all">
                        Update Sitemap
                    </button>
                </div>
            </section>
        </div>

        <!-- Section 3: Index List Display & Quick Removal -->
        <section class="glass-card p-6 rounded-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <i class="fas fa-list text-green-400"></i> Index List Display
                </h2>
                <button id="btnRefresh" class="text-xs bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full hover:bg-blue-500/20">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-xs uppercase border-b border-slate-800">
                            <th class="pb-3 font-medium">URL Halaman</th>
                            <th class="pb-3 font-medium text-center">Status</th>
                            <th class="pb-3 font-medium text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="indexList" class="text-sm">
                        <!-- Contoh Data (Nanti diisi via app.js) -->
                        <tr class="border-b border-slate-800/50">
                            <td class="py-4 text-slate-300">https://pembri.com/roots-reggae</td>
                            <td class="py-4 text-center">
                                <span class="status-badge bg-green-500/10 text-green-500">Terindeks</span>
                            </td>
                            <td class="py-4 text-right">
                                <button class="text-red-400 hover:text-red-300 text-xs">
                                    <i class="fas fa-trash-alt"></i> Hapus
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- Modal Status Inspector -->
    <div id="statusModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4">
        <div class="glass-card max-w-md w-full p-6 rounded-2xl border-blue-500/30">
            <h3 class="text-lg font-bold mb-2">URL Inspection</h3>
            <div id="inspectionResult" class="text-sm text-slate-400 space-y-2">
                <!-- Hasil inspeksi muncul di sini -->
            </div>
            <button onclick="document.getElementById('statusModal').classList.add('hidden')" 
                class="mt-6 w-full py-2 bg-slate-700 rounded-lg">Tutup</button>
        </div>
    </div>

    <!-- Script Placeholder (Nanti kita buat app.js) -->
    <script src="app.js"></script>
</body>
</html>
