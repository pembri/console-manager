<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI Roots | Console Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-50 bg-neutral-950 flex flex-col items-center justify-center p-6">
        <div class="bg-neutral-900 border border-white/10 p-8 rounded-lg shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-green-500 mb-6 uppercase tracking-widest">Akses Terkunci</h2>
            <input type="number" id="password-input" class="w-full bg-black border border-white/10 px-4 py-3 text-white text-center text-xl focus:outline-none focus:border-green-500 mb-4" placeholder="Masukkan Sandi">
            <button onclick="checkPassword()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded uppercase">Buka Tools</button>
            <p id="login-error" class="text-red-500 text-xs mt-4 hidden">Sandi Salah!</p>
        </div>
    </div>

    <div id="main-dashboard" class="hidden p-4 md:p-8 max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold uppercase tracking-widest">Console <span class="text-green-600">Manager</span></h1>
            <p class="text-gray-500 text-[10px] mt-2 uppercase tracking-widest">SAI ROOTS INDEXING SYSTEM</p>
        </header>

        <div class="bg-neutral-900 p-4 rounded border border-gray-800 mb-6">
            <label class="block text-[10px] text-gray-500 uppercase mb-2">URL Web App Google Script</label>
            <input type="text" id="gas-url" class="w-full bg-black border border-gray-700 p-2 text-sm text-white focus:border-green-500 outline-none rounded" value="https://script.google.com/macros/s/AKfycbynokPlBR_LdT8h9gL7aBkNzEnupgs5VmBwJCVXTTIBJsN27oT7QVd2VQSXUdbAN27Jow/exec">
        </div>

        <div class="flex border-b border-gray-800 mb-6 text-[10px] uppercase tracking-widest overflow-x-auto">
            <button onclick="switchTab('tab-manual')" id="btn-manual" class="pb-3 px-4 tab-active">Manual & Sitemap</button>
            <button onclick="switchTab('tab-all')" id="btn-all" class="pb-3 px-4 tab-inactive">Database URL</button>
            <button onclick="switchTab('tab-indexed')" id="btn-indexed" class="pb-3 px-4 tab-inactive text-green-500">✔ Terindeks</button>
            <button onclick="switchTab('tab-not-indexed')" id="btn-not-indexed" class="pb-3 px-4 tab-inactive text-red-500">✖ Belum Indeks</button>
        </div>

        <div id="tab-manual" class="tab-content block bg-neutral-900 p-6 rounded border border-gray-800">
            <input type="text" id="target-url" class="w-full bg-black border border-gray-700 p-3 rounded text-sm mb-4 focus:border-green-500 outline-none" placeholder="Masukkan URL atau Link Sitemap">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <button onclick="executeApi(document.getElementById('target-url').value, 'update')" class="bg-green-600 p-3 rounded font-bold text-[10px] uppercase">Minta Indeks</button>
                <button onclick="executeApi(document.getElementById('target-url').value, 'check')" class="bg-blue-600 p-3 rounded font-bold text-[10px] uppercase">Uji URL</button>
                <button onclick="executeApi(document.getElementById('target-url').value, 'delete')" class="bg-red-600 p-3 rounded font-bold text-[10px] uppercase text-white">Hapus Indeks</button>
                <button onclick="executeApi(document.getElementById('target-url').value, 'sitemap')" class="bg-yellow-600 p-3 rounded font-bold text-[10px] uppercase text-black">Kirim Sitemap</button>
            </div>
        </div>

        <div id="tab-all" class="tab-content hidden bg-neutral-900 p-4 rounded border border-gray-800">
            <div id="list-all" class="space-y-2 max-h-96 overflow-y-auto pr-2"></div>
        </div>

        <div id="tab-indexed" class="tab-content hidden bg-neutral-900 p-4 rounded border border-green-900/30">
            <div id="list-indexed" class="space-y-2"></div>
        </div>

        <div id="tab-not-indexed" class="tab-content hidden bg-neutral-900 p-4 rounded border border-red-900/30">
            <div id="list-not-indexed" class="space-y-2"></div>
        </div>

        <div class="mt-6 bg-black p-4 rounded border border-gray-800 min-h-[120px]">
            <p class="text-[9px] text-gray-600 uppercase mb-2">System Logs:</p>
            <pre id="output" class="text-[11px] text-green-500 whitespace-pre-wrap">Siap digunakan...</pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
